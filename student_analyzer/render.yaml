services:
  - type: web
    name: student-performance-analyzer
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn 'app:create_app(\"production\")' --workers 2 --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: student-analyzer-db
          property: connectionString

databases:
  - name: student-analyzer-db
    databaseName: student_analyzer
    plan: free
